<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auth0 — Intro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Tokens (Auth0 new palette)
       ============================================================ */
    :root {
      --black:       #000000;
      --neutral-100: #FBFBFA;
      --neutral-200: #ECEBE4;
      --purple-100:  #EBD3FF;
      --purple-200:  #BC6DFF;
      --purple-300:  #9921FE;
      --purple-400:  #490186;
      --purple-500:  #20003A;
      --orange-300:  #FF6217;

      --font-display: 'DM Sans', 'Aeonik', Inter, system-ui, sans-serif;
      --font-mono:    'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

      /* Smart Animate-like easing */
      --ease-out: cubic-bezier(.16,.84,.3,1);
      --ease-in:  cubic-bezier(.55,.06,.68,.19);
      --ease:     cubic-bezier(.2,.8,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #07000f; color: var(--neutral-100); font-family: var(--font-display); }
    body { display: flex; align-items: center; justify-content: center; }

    /* ============================================================
       Stage shell
       ============================================================ */
    .stage {
      position: relative;
      width: min(96vw, 1600px);
      aspect-ratio: 16 / 9;
      background: var(--purple-500);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }

    /* Dot grid (very faint) */
    .grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(235,211,255,.06) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 75%);
      opacity: 0;
      transition: opacity 1200ms var(--ease);
    }

    /* Radial pulse */
    .pulse {
      position: absolute; left: 50%; top: 50%;
      width: 1100px; height: 1100px;
      transform: translate(-50%, -50%) scale(.2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(153,33,254,.45), transparent 60%);
      opacity: 0;
      transition: transform 1400ms var(--ease), opacity 1400ms var(--ease);
      pointer-events: none;
      filter: blur(20px);
    }

    /* Orbital arcs */
    .orbit {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      border-radius: 50%;
      border: 1px solid rgba(188,109,255,.0);
      transition: width 1100ms var(--ease), height 1100ms var(--ease), border-color 800ms var(--ease), opacity 800ms var(--ease);
      opacity: 0;
    }
    .orbit--1 { width: 0; height: 0; }
    .orbit--2 { width: 0; height: 0; }
    .orbit--3 { width: 0; height: 0; animation: orbit-spin 30s linear infinite; }
    @keyframes orbit-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* Lockup wrapper centers shield + wordmark + tagline */
    .lockup {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
    }

    .shield-wrap { position: relative; width: 110px; height: 138px; }
    .shield-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Shield outline (path stroked first) */
    .shield-outline {
      stroke: var(--neutral-100);
      stroke-width: 3;
      fill: transparent;
      stroke-dasharray: 320;
      stroke-dashoffset: 320;
      transition: stroke-dashoffset 900ms var(--ease-out), fill 500ms var(--ease) 600ms;
    }
    .shield-fill {
      fill: var(--neutral-100);
      opacity: 0;
      transform: scale(.92);
      transform-origin: 50% 50%;
      transition: opacity 500ms var(--ease), transform 500ms var(--ease-out);
    }
    .shield-cut {
      fill: var(--purple-500);
      opacity: 0;
      transition: opacity 400ms var(--ease) 100ms;
    }
    .shield-tri {
      fill: var(--neutral-100);
      opacity: 0;
      transform: translateY(-12px) scale(.7);
      transform-origin: 50% 70%;
      transition: opacity 400ms var(--ease) 200ms, transform 500ms var(--ease-out) 200ms;
    }

    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: 64px;
      color: var(--neutral-100);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 700ms var(--ease), transform 700ms var(--ease-out);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--purple-200);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 700ms var(--ease) 100ms, transform 700ms var(--ease-out) 100ms;
    }

    /* Glow halo behind lockup */
    .halo {
      position: absolute; left: 50%; top: 50%;
      width: 720px; height: 720px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(153,33,254,.35), transparent 65%);
      opacity: 0;
      transition: opacity 1000ms var(--ease);
      filter: blur(40px);
      pointer-events: none;
    }

    /* Light sweep */
    .sweep {
      position: absolute; top: 0; bottom: 0; width: 80%;
      left: -100%;
      background: linear-gradient(95deg, transparent, rgba(235,211,255,.09), transparent);
      transition: left 1400ms var(--ease);
    }

    /* Ambient particles */
    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: var(--purple-200);
      opacity: 0;
      transition: opacity 1200ms var(--ease), transform 4200ms linear;
    }

    /* Frame label chip */
    .frame-tag {
      position: absolute; top: 18px; left: 22px;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em;
      color: rgba(235,211,255,.55); text-transform: uppercase;
    }

    /* Out fade overlay */
    .veil {
      position: absolute; inset: 0; background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 900ms var(--ease-in);
    }

    /* ============================================================
       HYPERFRAMES
       Each [data-frame] sets the snapshot state for all elements.
       Transitions interpolate between these states (Smart Animate).
       ============================================================ */

    /* f1 — empty dark stage */
    .stage[data-frame="f1"] .grid { opacity: 0; }
    .stage[data-frame="f1"] .pulse { transform: translate(-50%,-50%) scale(.2); opacity: 0; }
    .stage[data-frame="f1"] .halo { opacity: 0; }
    .stage[data-frame="f1"] .sweep { left: -100%; }
    .stage[data-frame="f1"] .particle { opacity: 0; }

    /* f2 — pulse + sweep + grid wash */
    .stage[data-frame="f2"] .grid { opacity: 1; }
    .stage[data-frame="f2"] .pulse { transform: translate(-50%,-50%) scale(1); opacity: .9; }
    .stage[data-frame="f2"] .sweep { left: 60%; }
    .stage[data-frame="f2"] .orbit--1 { width: 220px; height: 220px; border-color: rgba(188,109,255,.25); opacity: 1; }
    .stage[data-frame="f2"] .orbit--2 { width: 360px; height: 360px; border-color: rgba(188,109,255,.16); opacity: 1; }
    .stage[data-frame="f2"] .orbit--3 { width: 520px; height: 520px; border-color: rgba(188,109,255,.10); opacity: 1; }

    /* f3 — shield outline draws in */
    .stage[data-frame="f3"] .grid { opacity: 1; }
    .stage[data-frame="f3"] .pulse { transform: translate(-50%,-50%) scale(1); opacity: .55; }
    .stage[data-frame="f3"] .halo { opacity: .6; }
    .stage[data-frame="f3"] .orbit--1 { width: 220px; height: 220px; border-color: rgba(188,109,255,.25); opacity: 1; }
    .stage[data-frame="f3"] .orbit--2 { width: 360px; height: 360px; border-color: rgba(188,109,255,.16); opacity: 1; }
    .stage[data-frame="f3"] .orbit--3 { width: 520px; height: 520px; border-color: rgba(188,109,255,.10); opacity: 1; }
    .stage[data-frame="f3"] .shield-outline { stroke-dashoffset: 0; }

    /* f4 — shield fills + center triangle drops + wordmark rises */
    .stage[data-frame="f4"] .grid { opacity: 1; }
    .stage[data-frame="f4"] .pulse { transform: translate(-50%,-50%) scale(1); opacity: .35; }
    .stage[data-frame="f4"] .halo { opacity: .9; }
    .stage[data-frame="f4"] .orbit--1 { width: 220px; height: 220px; border-color: rgba(188,109,255,.18); opacity: 1; }
    .stage[data-frame="f4"] .orbit--2 { width: 360px; height: 360px; border-color: rgba(188,109,255,.10); opacity: 1; }
    .stage[data-frame="f4"] .orbit--3 { width: 520px; height: 520px; border-color: rgba(188,109,255,.06); opacity: 1; }
    .stage[data-frame="f4"] .shield-outline { stroke-dashoffset: 0; }
    .stage[data-frame="f4"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f4"] .shield-cut { opacity: 1; }
    .stage[data-frame="f4"] .shield-tri { opacity: 1; transform: translateY(0) scale(1); }
    .stage[data-frame="f4"] .wordmark { opacity: 1; transform: translateY(0); }

    /* f5 — full lockup with tagline */
    .stage[data-frame="f5"] .grid { opacity: 1; }
    .stage[data-frame="f5"] .pulse { transform: translate(-50%,-50%) scale(1); opacity: .45; }
    .stage[data-frame="f5"] .halo { opacity: 1; }
    .stage[data-frame="f5"] .orbit--1 { width: 260px; height: 260px; border-color: rgba(188,109,255,.18); opacity: 1; }
    .stage[data-frame="f5"] .orbit--2 { width: 420px; height: 420px; border-color: rgba(188,109,255,.10); opacity: 1; }
    .stage[data-frame="f5"] .orbit--3 { width: 600px; height: 600px; border-color: rgba(188,109,255,.06); opacity: 1; }
    .stage[data-frame="f5"] .shield-outline { stroke-dashoffset: 0; }
    .stage[data-frame="f5"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f5"] .shield-cut { opacity: 1; }
    .stage[data-frame="f5"] .shield-tri { opacity: 1; transform: translateY(0) scale(1); }
    .stage[data-frame="f5"] .wordmark { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f5"] .tagline { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f5"] .particle { opacity: .8; }

    /* f6 — fade out */
    .stage[data-frame="f6"] .veil { opacity: 1; }
    .stage[data-frame="f6"] .lockup { transform: scale(1.04); filter: blur(4px); transition: transform 900ms var(--ease-in), filter 900ms var(--ease-in); }

    .lockup { transition: transform 600ms var(--ease), filter 600ms var(--ease); }

    /* ============================================================
       Controls
       ============================================================ */
    .controls {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(20,0,40,.78); border: 1px solid rgba(188,109,255,.3);
      padding: 8px 12px; border-radius: 999px;
      backdrop-filter: blur(10px);
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .08em;
      color: var(--purple-100);
      z-index: 10;
    }
    .controls button {
      appearance: none; border: 0; cursor: pointer;
      background: var(--purple-300); color: var(--neutral-100);
      font: inherit; padding: 8px 14px; border-radius: 999px; letter-spacing: .14em;
      text-transform: uppercase;
    }
    .controls button:hover { background: var(--purple-200); color: var(--purple-500); }
    .controls .timer { min-width: 64px; text-align: right; opacity: .8; }
    .controls .frame-readout { min-width: 32px; opacity: .7; }
  </style>
</head>
<body>

  <div class="stage" id="stage" data-frame="f1">
    <div class="grid"></div>
    <div class="halo"></div>
    <div class="pulse"></div>

    <div class="orbit orbit--3"></div>
    <div class="orbit orbit--2"></div>
    <div class="orbit orbit--1"></div>

    <div class="sweep"></div>

    <div class="particles" id="particles"></div>

    <div class="lockup">
      <div class="shield-wrap">
        <!-- viewBox 64x80; the shield path data is normalized -->
        <svg viewBox="0 0 64 80" aria-hidden="true">
          <!-- Outline (drawn first via stroke-dashoffset) -->
          <path class="shield-outline"
                d="M32 4 L60 16 L60 38 C60 52 47 62 32 64 C17 62 4 52 4 38 L4 16 Z" />
          <!-- Filled shield body -->
          <path class="shield-fill"
                d="M32 4 L60 16 L60 38 C60 52 47 62 32 64 C17 62 4 52 4 38 L4 16 Z" />
          <!-- Inner cut (negative space inside shield) -->
          <path class="shield-cut"
                d="M32 12 L52 21 L52 38 C52 48 42 56 32 58 C22 56 12 48 12 38 L12 21 Z" />
          <!-- Center triangle "0" mark -->
          <path class="shield-tri"
                d="M32 24 L42 46 L22 46 Z" />
        </svg>
      </div>
      <div class="wordmark">auth0</div>
      <div class="tagline">Identity for AI Agents</div>
    </div>

    <div class="veil"></div>
    <div class="frame-tag" id="frameTag">FRAME · f1</div>
  </div>

  <div class="controls">
    <button id="btnReplay">Replay</button>
    <span class="frame-readout" id="readout">f1</span>
    <span class="timer" id="timer">0.0s</span>
  </div>

  <script>
    // ============================================================
    // HYPERFRAME TIMELINE
    // Each entry is a Figma-style frame: {name, t (ms)}
    // The stage's data-frame attribute drives all element states.
    // CSS transitions interpolate between frames (Smart Animate).
    // ============================================================
    const TIMELINE = [
      { name: 'f1', t:    0, label: 'dark stage' },
      { name: 'f2', t:  300, label: 'pulse + orbits' },
      { name: 'f3', t: 1100, label: 'shield outline' },
      { name: 'f4', t: 1900, label: 'shield + wordmark' },
      { name: 'f5', t: 2700, label: 'tagline reveal' },
      { name: 'f6', t: 4400, label: 'fade out' },
    ];
    const TOTAL = 5400;

    const stage   = document.getElementById('stage');
    const readout = document.getElementById('readout');
    const tagEl   = document.getElementById('frameTag');
    const timer   = document.getElementById('timer');

    // Spawn ambient particles once
    (function spawnParticles(){
      const root = document.getElementById('particles');
      for (let i=0; i<22; i++){
        const p = document.createElement('div');
        p.className = 'particle';
        const x = Math.random()*100, y = Math.random()*100;
        p.style.left = x + '%';
        p.style.top  = y + '%';
        p.style.transform = `translate(${(Math.random()*40-20)}px, ${(Math.random()*-60)}px)`;
        p.style.transitionDelay = (Math.random()*1200) + 'ms';
        root.appendChild(p);
      }
    })();

    let timers = [];
    let startedAt = 0;
    let raf;

    function play() {
      // Reset
      timers.forEach(clearTimeout);
      timers = [];
      stage.dataset.frame = 'f1';
      readout.textContent = 'f1';
      tagEl.textContent   = 'FRAME · f1 — ' + TIMELINE[0].label;
      // Schedule each frame
      TIMELINE.forEach(f => {
        timers.push(setTimeout(() => {
          stage.dataset.frame = f.name;
          readout.textContent = f.name;
          tagEl.textContent   = `FRAME · ${f.name} — ${f.label}`;
        }, f.t));
      });
      startedAt = performance.now();
      cancelAnimationFrame(raf);
      const tick = () => {
        const t = (performance.now() - startedAt) / 1000;
        timer.textContent = t.toFixed(1) + 's';
        if (t * 1000 < TOTAL + 400) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }

    document.getElementById('btnReplay').addEventListener('click', play);
    play();
  </script>
</body>
</html>
