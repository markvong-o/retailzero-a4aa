<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auth0 — Outro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Tokens — Auth0 new palette
       ============================================================ */
    :root {
      --neutral-100: #FBFBFA;
      --neutral-200: #ECEBE4;
      --purple-100:  #EBD3FF;
      --purple-200:  #BC6DFF;
      --purple-300:  #9921FE;
      --purple-400:  #490186;
      --purple-500:  #20003A;
      --orange-300:  #FF6217;

      --font-display: 'DM Sans', 'Aeonik', Inter, system-ui, sans-serif;
      --font-mono:    'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

      --ease-out:    cubic-bezier(.16,.84,.3,1);
      --ease:        cubic-bezier(.2,.8,.2,1);
      --ease-in:     cubic-bezier(.55,.06,.68,.19);
      --ease-stamp:  cubic-bezier(.22,1.5,.36,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #07000f; color: var(--neutral-100); font-family: var(--font-display); }
    body { display: flex; align-items: center; justify-content: center; }

    .stage {
      position: relative;
      width: min(96vw, 1600px);
      aspect-ratio: 16 / 9;
      background: var(--purple-500);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }

    /* Persistent grid */
    .grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(235,211,255,.05) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at 50% 50%, black 25%, transparent 75%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 25%, transparent 75%);
      opacity: 1;
    }

    /* Light sweep band */
    .sweep {
      position: absolute; top: 0; bottom: 0;
      width: 60%;
      left: -70%;
      background: linear-gradient(95deg, transparent, rgba(235,211,255,.10), transparent);
      transition: left 1300ms var(--ease);
      pointer-events: none;
    }

    /* Horizon line under the lockup, anchoring the stamp */
    .horizon {
      position: absolute; left: 50%; bottom: 22%;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(188,109,255,.55), transparent);
      transform: translateX(-50%);
      transition: width 1100ms var(--ease-out);
      opacity: 0;
    }

    /* Halo behind lockup */
    .halo {
      position: absolute; left: 50%; top: 50%;
      width: 760px; height: 760px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(153,33,254,.35), transparent 65%);
      opacity: 0;
      transition: opacity 1000ms var(--ease);
      filter: blur(40px);
      pointer-events: none;
    }

    /* Lockup */
    .lockup {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
      transition: transform 1100ms var(--ease-in), filter 1100ms var(--ease-in);
    }

    .shield-wrap { position: relative; width: 110px; height: 138px; }
    .shield-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    .shield-fill {
      fill: var(--neutral-100);
      opacity: 0;
      transform: scale(1.6);
      transform-origin: 50% 50%;
      transition: opacity 600ms var(--ease), transform 800ms var(--ease-stamp);
    }
    .shield-cut {
      fill: var(--purple-500);
      opacity: 0;
      transition: opacity 400ms var(--ease) 200ms;
    }
    .shield-tri {
      fill: var(--neutral-100);
      opacity: 0;
      transform: scale(.5);
      transform-origin: 50% 70%;
      transition: opacity 400ms var(--ease) 350ms, transform 500ms var(--ease-stamp) 350ms;
    }

    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: 64px;
      color: var(--neutral-100);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 700ms var(--ease), transform 800ms var(--ease-out);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: var(--purple-200);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 700ms var(--ease) 80ms, transform 700ms var(--ease-out) 80ms;
    }

    /* Subtle particles drifting upward */
    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute;
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--purple-200);
      opacity: 0;
      transition: opacity 1400ms var(--ease), transform 5000ms linear;
    }

    /* Stamp shockwave ring */
    .shock {
      position: absolute; left: 50%; top: 50%;
      width: 80px; height: 80px;
      transform: translate(-50%, -50%) scale(.4);
      border-radius: 50%;
      border: 2px solid rgba(235,211,255,.5);
      opacity: 0;
      transition: transform 900ms var(--ease-out), opacity 900ms var(--ease);
      pointer-events: none;
    }

    /* Black veil for final fade */
    .veil {
      position: absolute; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1100ms var(--ease-in);
    }

    .frame-tag {
      position: absolute; top: 18px; left: 22px;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em;
      color: rgba(235,211,255,.55); text-transform: uppercase;
    }

    /* ============================================================
       HYPERFRAMES
       ============================================================ */

    /* f1 — dark stage, faint grid */
    .stage[data-frame="f1"] .sweep { left: -70%; }
    .stage[data-frame="f1"] .halo { opacity: 0; }
    .stage[data-frame="f1"] .horizon { width: 0; opacity: 0; }
    .stage[data-frame="f1"] .shock { opacity: 0; transform: translate(-50%,-50%) scale(.4); }

    /* f2 — light sweep crosses */
    .stage[data-frame="f2"] .sweep { left: 110%; }
    .stage[data-frame="f2"] .horizon { width: 60%; opacity: 1; }

    /* f3 — shield stamps (with shockwave) */
    .stage[data-frame="f3"] .horizon { width: 60%; opacity: 1; }
    .stage[data-frame="f3"] .halo { opacity: .6; }
    .stage[data-frame="f3"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f3"] .shield-cut { opacity: 1; }
    .stage[data-frame="f3"] .shield-tri { opacity: 1; transform: scale(1); }
    .stage[data-frame="f3"] .shock { opacity: 0; transform: translate(-50%,-50%) scale(4.2); }

    /* f4 — wordmark slides up */
    .stage[data-frame="f4"] .horizon { width: 60%; opacity: 1; }
    .stage[data-frame="f4"] .halo { opacity: .9; }
    .stage[data-frame="f4"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f4"] .shield-cut { opacity: 1; }
    .stage[data-frame="f4"] .shield-tri { opacity: 1; transform: scale(1); }
    .stage[data-frame="f4"] .wordmark { opacity: 1; transform: translateY(0); }

    /* f5 — tagline reveals */
    .stage[data-frame="f5"] .horizon { width: 60%; opacity: 1; }
    .stage[data-frame="f5"] .halo { opacity: 1; }
    .stage[data-frame="f5"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f5"] .shield-cut { opacity: 1; }
    .stage[data-frame="f5"] .shield-tri { opacity: 1; transform: scale(1); }
    .stage[data-frame="f5"] .wordmark { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f5"] .tagline { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f5"] .particle { opacity: .7; }

    /* f6 — hold with breathing glow */
    .stage[data-frame="f6"] .horizon { width: 60%; opacity: .7; }
    .stage[data-frame="f6"] .halo { opacity: .8; animation: halo-breathe 2.4s ease-in-out infinite; }
    .stage[data-frame="f6"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f6"] .shield-cut { opacity: 1; }
    .stage[data-frame="f6"] .shield-tri { opacity: 1; transform: scale(1); }
    .stage[data-frame="f6"] .wordmark { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f6"] .tagline { opacity: 1; transform: translateY(0); }
    .stage[data-frame="f6"] .particle { opacity: .7; }

    @keyframes halo-breathe {
      0%, 100% { opacity: .75; }
      50%      { opacity: 1; }
    }

    /* f7 — fade to black */
    .stage[data-frame="f7"] .horizon { width: 60%; opacity: 0; }
    .stage[data-frame="f7"] .halo { opacity: 0; }
    .stage[data-frame="f7"] .shield-fill { opacity: 1; transform: scale(1); }
    .stage[data-frame="f7"] .shield-cut { opacity: 1; }
    .stage[data-frame="f7"] .shield-tri { opacity: 1; transform: scale(1); }
    .stage[data-frame="f7"] .wordmark { opacity: 1; }
    .stage[data-frame="f7"] .tagline { opacity: 1; }
    .stage[data-frame="f7"] .lockup { transform: scale(1.05); filter: blur(6px); }
    .stage[data-frame="f7"] .veil { opacity: 1; }

    /* ============================================================
       Controls
       ============================================================ */
    .controls {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(20,0,40,.78); border: 1px solid rgba(188,109,255,.3);
      padding: 8px 12px; border-radius: 999px;
      backdrop-filter: blur(10px);
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .08em;
      color: var(--purple-100);
      z-index: 10;
    }
    .controls button {
      appearance: none; border: 0; cursor: pointer;
      background: var(--purple-300); color: var(--neutral-100);
      font: inherit; padding: 8px 14px; border-radius: 999px; letter-spacing: .14em;
      text-transform: uppercase;
    }
    .controls button:hover { background: var(--purple-200); color: var(--purple-500); }
    .controls .timer { min-width: 64px; text-align: right; opacity: .8; }
    .controls .frame-readout { min-width: 32px; opacity: .7; }
  </style>
</head>
<body>

  <div class="stage" id="stage" data-frame="f1">
    <div class="grid"></div>
    <div class="halo"></div>
    <div class="sweep"></div>
    <div class="horizon"></div>

    <div class="particles" id="particles"></div>

    <div class="lockup">
      <div class="shield-wrap">
        <svg viewBox="0 0 64 80" aria-hidden="true">
          <path class="shield-fill"
                d="M32 4 L60 16 L60 38 C60 52 47 62 32 64 C17 62 4 52 4 38 L4 16 Z" />
          <path class="shield-cut"
                d="M32 12 L52 21 L52 38 C52 48 42 56 32 58 C22 56 12 48 12 38 L12 21 Z" />
          <path class="shield-tri"
                d="M32 24 L42 46 L22 46 Z" />
        </svg>
        <div class="shock"></div>
      </div>
      <div class="wordmark">auth0</div>
      <div class="tagline">Auth0 for AI Agents</div>
    </div>

    <div class="veil"></div>
    <div class="frame-tag" id="frameTag">FRAME · f1</div>
  </div>

  <div class="controls">
    <button id="btnReplay">Replay</button>
    <span class="frame-readout" id="readout">f1</span>
    <span class="timer" id="timer">0.0s</span>
  </div>

  <script>
    const TIMELINE = [
      { name: 'f1', t:    0, label: 'dark stage' },
      { name: 'f2', t:  300, label: 'light sweep · horizon line' },
      { name: 'f3', t: 1100, label: 'shield stamps in' },
      { name: 'f4', t: 1700, label: 'wordmark resolves' },
      { name: 'f5', t: 2300, label: 'tagline reveals' },
      { name: 'f6', t: 3000, label: 'breathing hold' },
      { name: 'f7', t: 4500, label: 'fade to black' },
    ];
    const TOTAL = 5800;

    const stage    = document.getElementById('stage');
    const tagEl    = document.getElementById('frameTag');
    const readout  = document.getElementById('readout');
    const timer    = document.getElementById('timer');

    (function spawnParticles(){
      const root = document.getElementById('particles');
      for (let i=0; i<22; i++){
        const p = document.createElement('div');
        p.className = 'particle';
        const x = Math.random()*100, y = 40 + Math.random()*60;
        p.style.left = x + '%';
        p.style.top  = y + '%';
        p.style.transform = `translate(${(Math.random()*30-15)}px, ${-50 - Math.random()*60}px)`;
        p.style.transitionDelay = (Math.random()*1400) + 'ms';
        root.appendChild(p);
      }
    })();

    let timers = [];
    let startedAt = 0;
    let raf;

    function play() {
      timers.forEach(clearTimeout);
      timers = [];
      stage.dataset.frame = 'f1';
      readout.textContent = 'f1';
      tagEl.textContent   = 'FRAME · f1 — ' + TIMELINE[0].label;
      TIMELINE.forEach(f => {
        timers.push(setTimeout(() => {
          stage.dataset.frame = f.name;
          readout.textContent = f.name;
          tagEl.textContent   = `FRAME · ${f.name} — ${f.label}`;
        }, f.t));
      });
      startedAt = performance.now();
      cancelAnimationFrame(raf);
      const tick = () => {
        const t = (performance.now() - startedAt) / 1000;
        timer.textContent = t.toFixed(1) + 's';
        if (t * 1000 < TOTAL + 400) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }

    document.getElementById('btnReplay').addEventListener('click', play);
    play();
  </script>
</body>
</html>
